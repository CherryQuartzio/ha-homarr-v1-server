configuration:
  security:
    name: "Security"
    description: "Configuration for authentication and encryption"
    fields:
      auth_credentials_enabled:
        name: "Enable credentials provider"
        description: "This is the default provider. First user is created using the onboarding process and the rest can be created by this user from the GUI"
      auth_logout_redirect_url:
        name: "Authentication Logout Redirect URL"
        description: "URL to redirect to after logout. If not set, users will be redirected to the login page"
      auth_session_expiry_time:
        name: "Authentication Session Expiry Time"
        description: "Duration for which the authentication session is valid. Example values are 30d for 30 days, 12h for 12 hours, etc."
      secret_encryption_key:
        name: "Secret Encryption Key"
        description: "Encryption key for encrypting sensitive data in the database. A random secret can be generated by using the following command: openssl rand -hex 32"
  auth_oidc:
    name: "OIDC authentication provider"
    description: "Configuration for OIDC authentication provider"
    fields:
      auth_oidc_enabled:
        name: "Enable OIDC authentication provider"
      auth_oidc_issuer:
        name: "OIDC Issuer URL"
        description: "URL of the OIDC issuer for authentication"
      auth_oidc_client_id:
        name: "OIDC Client ID"
        description: "Client ID for OIDC authentication"
      auth_oidc_client_secret:
        name: "OIDC Client Secret"
        description: "Client secret for OIDC authentication"
      auth_oidc_client_name:
        name: "OIDC Client Name"
        description: "Name of the OIDC client for display purposes"
      auth_oidc_auto_login:
        name: "OIDC Auto Login"
        description: "Automatically log in users with OIDC if they are not already authenticated"
      auth_oidc_scope_overwrite:
        name: "OIDC Scope Overwrite"
        description: "Overwrite the default OIDC scopes. Should be a space-separated list of scopes"
      auth_oidc_groups_attribute:
        name: "OIDC Groups Attribute"
        description: "Name of the OIDC attribute that contains the user's groups"
      auth_oidc_name_attribute_overwrite:
        name: "OIDC Name Attribute Overwrite"
        description: "Overwrite name attribute. By default it will use preferred_username if it does not contain a @ and otherwise name."
      auth_oidc_force_userinfo:
        name: "OIDC Force Userinfo"
        description: "Force fetching user info from the userinfo endpoint instead of using the ID token claims"
      auth_oidc_enable_dangerous_account_linking:
        name: "OIDC Enable Dangerous Account Linking"
        description: "Enable account linking for OIDC provider. This will link the OIDC accounts by email. Be sure that you have verified emails to prevent stealing accounts."
  auth_ldap:
    name: "LDAP authentication provider"
    description: "Configuration for LDAP authentication provider"
    fields:
      auth_ldap_enabled:
        name: "Enable LDAP authentication provider"
      auth_ldap_uri:
        name: "LDAP URI"
        description: "URI of the LDAP server for authentication. Example: ldap://ldap.example.com"
      auth_ldap_base:
        name: "LDAP Base DN"
        description: "Base DN for LDAP authentication. Example: dc=example,dc=com"
      auth_ldap_bind_dn:
        name: "LDAP Bind DN"
        description: "Bind DN for LDAP authentication. Example: cn=admin,dc=example,dc=com"
      auth_ldap_bind_password:
        name: "LDAP Bind Password"
        description: "Bind password for LDAP authentication"
      auth_ldap_username_attribute:
        name: "LDAP Username Attribute"
        description: "LDAP attribute to use as the username. Example: uid"
      auth_ldap_user_mail_attribute:
        name: "LDAP User Mail Attribute"
        description: "LDAP attribute to use as the user's email. Example: mail"
      auth_ldap_group_class:
        name: "LDAP Group Class"
        description: "LDAP object class to use for groups. Example: groupOfNames"
      auth_ldap_group_member_attribute:
        name: "LDAP Group Member Attribute"
        description: "LDAP attribute to use for group members. Example: member"
      auth_ldap_group_member_user_attribute:
        name: "LDAP Group Member User Attribute"
        description: "LDAP attribute to use for the user's identifier in the group member attribute. Example: uid"
      auth_ldap_search_scope:
        name: "LDAP Search Scope"
        description: "Scope for LDAP searches. Supported values are base, one and sub"
      auth_ldap_username_filter_extra_arg:
        name: "LDAP Username Filter Extra Argument"
        description: "Extra argument for the LDAP username filter. Example: (objectClass=person)"
      auth_ldap_group_filter_extra_arg:
        name: "LDAP Group Filter Extra Argument"
        description: "Extra argument for the LDAP group filter. Example: (objectClass=groupOfNames)"
  database:
    name: "Database"
    description: "Configuration for the database connection"
    fields:
      db_url:
        name: "Database URL"
        description: "URL for the database connection"
      db_dialect:
        name: "Database Dialect"
        description: "Type of database"
      db_driver:
        name: "Database Driver"
        description: "Database driver to use. Currently better-sqlite3 is used for sqlite, mysql2 for mysql and node-postgres for postgresql"
      db_host:
        name: "Database Host"
        description: "Hostname of the database server. Not required for sqlite"
      db_port:
        name: "Database Port"
        description: "Port of the database server. Not required for sqlite"
      db_name:
        name: "Database Name"
        description: "Name of the database. Not required for sqlite"
      db_user:
        name: "Database User"
        description: "Username for the database connection. Not required for sqlite"
      db_password:
        name: "Database Password"
        description: "Password for the database connection. Not required for sqlite"
  docker_socket_proxy:
    name: "Docker socket proxy"
    description: "For configuring the Docker integration. This is used to monitor Docker containers and display them on the dashboard"
    fields:
      docker_hostnames:
        name: "Docker Hostnames"
        description: "Comma-separated list of Docker hostnames to monitor"
      docker_ports:
        name: "Docker Ports"
        description: "Comma-separated list of Docker ports to monitor. Should be in the same order as the hostnames"
      docker_proxy_enabled:
        name: "Enable the Docker socket proxy"