events {
    worker_connections 1024;
}

http {
    server {
        listen 7575;
        listen [::]:7575;

        location ~ ^/api/hassio_ingress/([^/]+)/websockets/?$ {
            set $ingress_token $1;
            proxy_pass http://${HOSTNAME}:3001/websockets;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "Upgrade";
            proxy_set_header Host $http_host;
            proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
            proxy_set_header X-Forwarded-Host $http_host;
            proxy_set_header X-Ingress-Path /api/hassio_ingress/$ingress_token;
        }

        location /websockets {
            proxy_pass http://${HOSTNAME}:3001;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "Upgrade";
            proxy_set_header Host $http_host;
            proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
            proxy_set_header X-Forwarded-Host $http_host;
        }

        location ~ ^/api/hassio_ingress/([^/]+)(/.*)?$ {
            set $ingress_token $1;
            set $upstream_path $2;
            if ($upstream_path = "") {
                set $upstream_path /;
            }

            proxy_pass http://${HOSTNAME}:3000$upstream_path;
            proxy_redirect ~^(/.*)$ /api/hassio_ingress/$ingress_token$1;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
            proxy_set_header X-Forwarded-Host $http_host;
            proxy_set_header X-Ingress-Path /api/hassio_ingress/$ingress_token;
            client_max_body_size 32M;
        }

        location / {
            proxy_pass http://${HOSTNAME}:3000;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
            proxy_set_header X-Forwarded-Host $http_host;
            client_max_body_size 32M;
        }
    }
}
